databricks:
  host: "https://adb-1234.databricks.com"      # Override with ENV
  token_secret_name: "DATABRICKS_TOKEN"
  vector_search_endpoint: "legal_vector_endpoint"
  workspace_id: "123456789"

tables:
  catalog: "main"
  schema: "arthaneeti"
  bronze_table: "raw_legal_docs"
  silver_table: "processed_legal_chunks"
  gold_index: "legal_vector_index"

models:
  reasoning: "databricks-meta-llama-3-3-70b-instruct"
  reranker: "databricks-bge-reranker-large-en"
  embedding: "databricks-bge-large-en"
  router: "databricks-meta-llama-3-1-8b-instruct"

paths:
  raw_volume: "/Volumes/main/arthaneeti/raw_docs"
  checkpoints: "/dbfs/arthaneeti/checkpoints"

processing:
  chunk_size: 1000
  chunk_overlap: 100
  cdf_enabled: true
